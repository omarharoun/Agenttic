# All model names, thresholds, sample rates live here (Hard Rule 7)
models:
  agent_default: claude-sonnet-4-6        # reference agent (Step 2)
  judge_executor: claude-sonnet-4-6       # tiered judge: cheap executor, consults judge_strong
                                          # via the advisor tool (beta) on borderline calls.
                                          # Skipped when it would equal the agent model (Rule 4).
  judge_strong: claude-opus-4-8           # batch judge / advisor model (Step 5) — must differ from agent
  judge_light: claude-haiku-4-5-20251001  # live-path judge (Step 9)
  generator: claude-opus-4-8              # benchmark generator (Step 8)
harness:
  timeout_seconds: 120
  max_steps: 10
  max_parallel: 5
  transport_retries: 2
  resume: true        # reuse successful persisted traces on re-run (no re-spend)
scoring:
  calibration_threshold: 0.8
  advisor_max_tokens: 2048   # per-consult cap on advisor output (API minimum 1024)
  fi_threshold: 0.5          # Future AGI 0-1 score -> binary/three-point cutoff
live:
  sample_rate: 0.05
  drift_threshold: 0.15
  drift_window_runs: 50
paths:
  registry_db: ascore.db
  review_dir: review/
  calibration_dir: calibration/
ui:
  host: 127.0.0.1
  port: 8700
  uploads_dir: uploads/
leaderboard:
  suite_weights: {}   # per-suite Index weights (suite_id: weight); default 1.0 each
pricing:              # USD per 1M tokens, per model (Hard Rule 7: no hardcoded prices)
  claude-sonnet-4-6: {input: 3.0, output: 15.0}
  claude-opus-4-8: {input: 15.0, output: 75.0}
  claude-haiku-4-5-20251001: {input: 1.0, output: 5.0}
  default: {input: 3.0, output: 15.0}   # used when a model isn't listed above
cost:                 # priors for the pre-run cost estimator
  expected_agent_steps: 3       # agent LLM calls per case
  expected_input_tokens: 600    # per agent LLM call
  expected_output_tokens: 250
  judge_input_tokens: 700       # per judge criterion call
  judge_output_tokens: 120
budget:               # spend ceilings (0 = unlimited)
  max_run_cost_usd: 0.0         # abort a single run past this
  max_daily_cost_usd: 0.0       # global daily cap (per tenant); 0 = off
  warn_only: false              # true => estimate gate warns but does not abort
quotas:               # per-tenant spend quotas (0 = unlimited); enforced pre-run
  default: {daily_usd: 0.0, monthly_usd: 0.0}   # applies to tenants without a tier
  tiers: {}                                      # {tenant: {daily_usd, monthly_usd}}
anthropic:
  retry:              # transient-error resilience for all Anthropic SDK calls
    max_attempts: 5   # total tries (1 + 4 retries) on 5xx/429/overloaded/timeout
    base_delay: 0.5   # seconds; exponential backoff with full jitter
    max_delay: 30.0
    jitter: true
database:
  url: ""             # blank => SQLite (paths.registry_db, DB-per-tenant).
                      # Set a postgresql+psycopg:// URL (or ASCORE_DB env) for a
                      # shared Postgres with row-level tenant scoping.
events:
  backend: memory     # memory (single process) | redis (multi-worker SSE)
  redis_url: ""       # redis://host:6379/0 (or ASCORE_REDIS_URL); required for redis
retention:            # trace data lifecycle (run `ascore retention --apply` on a schedule)
  trace_redact_days: 0  # >0: strip inputs/outputs from traces older than N days (PII)
  trace_prune_days: 0   # >0: delete traces older than N days (scorecards keep aggregates)
observability:
  log_level: INFO     # ascore logger level
  log_json: true      # structured JSON request logs (false => plain text)
  otel_enabled: false # true + OTEL_EXPORTER_OTLP_ENDPOINT => export traces (needs the otel extra)
auth:
  required: false     # true => server refuses to start without a token (fail closed)
  token: ""           # the ADMIN token; prefer the ASCORE_API_TOKEN env var
                      # when any token is set, ALL /api routes need one
  tokens: {}          # additional principals: {token: role}; roles are
                      # viewer (read) < operator (run/approve/manage) < admin
  # -- user accounts / sessions (login path, in addition to the bearer token) --
  session_secret: ""        # ASCORE_SESSION_SECRET; falls back to the API token
  session_ttl_hours: 168    # cookie session lifetime (7 days)
  allow_signup: true        # open signup; each signup gets its own tenant workspace
  signup_role: admin        # role a self-signup receives (admin of their own tenant)
  admin_tenant: default
security:
  rate_limit_per_minute: 0          # 0 = off; per-client (token or IP) request cap
  rate_limit_backend: memory        # memory (default) | redis (multi-worker)
  redis_url: ""                     # redis://host:6379/0 — required for redis backend
  login_max_attempts: 5             # failed logins per email before lockout
  login_lockout_seconds: 900        # lockout window after too many failures
  blackbox_allowed_schemes: [http, https]
  blackbox_block_private: true      # block private/loopback/link-local/metadata IPs
  blackbox_url_allowlist: []        # if non-empty, only these host suffixes allowed
