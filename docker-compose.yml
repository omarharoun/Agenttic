# Full-stack deployment. The app runs zero-config (SQLite, in-memory events) by
# default; bring Postgres and/or Redis online with compose profiles:
#   docker compose up                      # app only (SQLite)
#   docker compose --profile postgres up   # app + Postgres
#   docker compose --profile redis up      # app + Redis (multi-worker events + rate limit)
#   docker compose --profile postgres --profile redis up
# Public access/TLS is handled by a Cloudflare Tunnel on the host (not compose);
# see docs/OPERATIONS.md.
services:
  app:
    build: .
    ports:
      - "8700:8700"
    env_file:
      - .env
    environment:
      # uncomment when running the matching profile:
      # ASCORE_DB: postgresql+psycopg://ascore:ascore@postgres:5432/ascore
      # ASCORE_REDIS_URL: redis://redis:6379/0
      ASCORE_HOST: "0.0.0.0"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ascore-data:/app/data        # SQLite DBs live here (paths.registry_db)
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ascore
      POSTGRES_PASSWORD: ascore
      POSTGRES_DB: ascore
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Lightweight self-hosted mail server (Go, single binary — fits the small VM
  # where docker-mailserver would not). RECEIVES support@agenttic.io (inbound 25
  # is open) and serves it over IMAP 993; provides submission on 587. Outbound
  # to the public internet is blocked on this droplet (25/465/587), so direct
  # delivery is impossible — the APP sends via a configurable relay instead
  # (see config email.smtp / SMTP_* env). Opt-in: `--profile mail`; bring up
  # only AFTER the mail DNS records exist (ACME needs mail.agenttic.io to
  # resolve). See docs/MAIL.md.
  mail:
    image: foxcpp/maddy:0.7
    profiles: ["mail"]
    hostname: mail.agenttic.io
    environment:
      MADDY_HOSTNAME: mail.agenttic.io
      MADDY_DOMAIN: agenttic.io
    ports:
      - "25:25"      # inbound SMTP — receive mail for support@agenttic.io
      - "587:587"    # submission (STARTTLS) — clients/app send
      - "993:993"    # IMAP over TLS — read the mailbox
    volumes:
      - maddy-data:/data
      # pre-generated DKIM key (selector "mail"); host-only secret, never in git
      - ./mail/dkim/mail.key:/data/dkim_keys/agenttic.io_mail.key:ro
    restart: unless-stopped

# Public exposure / TLS: front the app with a Cloudflare Tunnel (cloudflared)
# running as a host systemd service — outbound-only, TLS terminated at
# Cloudflare's edge, no inbound ports opened on the VM. The app stays bound to
# 127.0.0.1:8700 and the tunnel routes the domain → http://localhost:8700.
# See docs/OPERATIONS.md ("Public access via Cloudflare Tunnel").

volumes:
  ascore-data:
  pg-data:
  redis-data:
  maddy-data:
