# Full-stack deployment. The app runs zero-config (SQLite, in-memory events) by
# default; bring Postgres and/or Redis online with compose profiles:
#   docker compose up                      # app only (SQLite)
#   docker compose --profile postgres up   # app + Postgres
#   docker compose --profile redis up      # app + Redis (multi-worker events + rate limit)
#   docker compose --profile postgres --profile redis up
#   docker compose --profile postgres --profile redis --profile caddy up
#     ^ adds the Caddy reverse proxy for auto-HTTPS (needs ASCORE_DOMAIN set).
services:
  app:
    build: .
    ports:
      - "8700:8700"
    env_file:
      - .env
    environment:
      # uncomment when running the matching profile:
      # ASCORE_DB: postgresql+psycopg://ascore:ascore@postgres:5432/ascore
      # ASCORE_REDIS_URL: redis://redis:6379/0
      ASCORE_HOST: "0.0.0.0"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ascore-data:/app/data        # SQLite DBs live here (paths.registry_db)
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ascore
      POSTGRES_PASSWORD: ascore
      POSTGRES_DB: ascore
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opt-in TLS reverse proxy. Enable with `--profile caddy` AND set ASCORE_DOMAIN
  # to a DNS name pointing at this host; Caddy then auto-provisions HTTPS and
  # proxies to the app over the internal network (app need not be published).
  # Leave it off until a hostname exists (the app stays on 127.0.0.1 only).
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    environment:
      ASCORE_DOMAIN: ${ASCORE_DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  ascore-data:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:
