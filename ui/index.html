<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Agenttic</title>
    <!-- no-flash theme: apply the persisted choice before first paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ascore_theme");
          var resolved = t === "light" ? "light"
            : t === "system" ? (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
            : "dark";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {}
      })();
    </script>
    <!-- Noor type system -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,380;0,6..72,440;0,6..72,500;0,6..72,600;1,6..72,440;1,6..72,500&family=Hanken+Grotesk:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
