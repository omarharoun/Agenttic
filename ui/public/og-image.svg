<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0D10"/>
      <stop offset="1" stop-color="#08090B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#C9A227" stop-opacity="0.10"/>
      <stop offset="0.7" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- fine ruled field -->
  <g stroke="#E9EAE5" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
  </g>

  <!-- brand -->
  <g transform="translate(84,74)">
    <path d="M14 0l24 14v28L14 56 -10 42V14z" transform="translate(10,0)" fill="none" stroke="#C9A227" stroke-width="3.4" stroke-linejoin="round"/>
    <text x="70" y="40" fill="#EAEBE6" font-size="38" letter-spacing="2">Agenttic</text>
  </g>

  <!-- eyebrow -->
  <text x="86" y="240" fill="#C9A227" font-family="ui-monospace, 'Courier New', monospace" font-size="20" letter-spacing="5">THE SAFETY LAB FOR AI AGENTS</text>

  <!-- headline -->
  <text x="82" y="322" fill="#EAEBE6" font-size="66" letter-spacing="-1">Measure what your agent</text>
  <text x="82" y="398" fill="#EAEBE6" font-size="66" letter-spacing="-1"><tspan fill="#D9B740" font-style="italic">actually does.</tspan></text>

  <!-- subline -->
  <text x="86" y="466" fill="#969CA3" font-family="Helvetica, Arial, sans-serif" font-size="25">Real, published safety benchmarks. Signed, version-pinned</text>
  <text x="86" y="500" fill="#969CA3" font-family="Helvetica, Arial, sans-serif" font-size="25">certificates. Honest about what wasn’t tested.</text>

  <!-- instrument card: grade A + trace -->
  <g transform="translate(838,150)">
    <rect x="0" y="0" width="286" height="330" rx="8" fill="#0E1013" stroke="#242930" stroke-width="1.5"/>
    <text x="24" y="42" fill="#6A7077" font-family="ui-monospace, 'Courier New', monospace" font-size="13" letter-spacing="1.5">SAFETY REPORT · “ORCHESTRA”</text>
    <text x="26" y="78" fill="#6A7077" font-family="ui-monospace, 'Courier New', monospace" font-size="13" letter-spacing="3">GRADE</text>
    <text x="20" y="162" fill="#6FA07A" font-size="120" text-anchor="start">A</text>
    <text x="120" y="150" fill="#99A0A7" font-family="ui-monospace, 'Courier New', monospace" font-size="19">Index <tspan fill="#EAEBE6" font-weight="bold">91</tspan></text>
    <!-- ruled field + trace -->
    <g transform="translate(24,180)">
      <g stroke="#E9EAE5" stroke-opacity="0.05" stroke-width="1">
        <line x1="0" y1="0" x2="238" y2="0"/>
        <line x1="0" y1="40" x2="238" y2="40"/>
        <line x1="0" y1="80" x2="238" y2="80"/>
        <line x1="0" y1="118" x2="238" y2="118"/>
      </g>
      <path d="M8,44 L46,58 L84,50 L122,12 L160,28 L198,66 L232,90 L232,118 L8,118 Z" fill="#C9A227" fill-opacity="0.12"/>
      <path d="M8,44 L46,58 L84,50 L122,12 L160,28 L198,66 L232,90" fill="none" stroke="#C9A227" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <g fill="#0E1013" stroke="#D9B740" stroke-width="2.5">
        <circle cx="8" cy="44" r="4"/><circle cx="46" cy="58" r="4"/><circle cx="84" cy="50" r="4"/>
        <circle cx="122" cy="12" r="4"/><circle cx="160" cy="28" r="4"/><circle cx="198" cy="66" r="4"/><circle cx="232" cy="90" r="4"/>
      </g>
    </g>
  </g>

  <!-- footer chips -->
  <text x="86" y="566" fill="#646A71" font-family="ui-monospace, 'Courier New', monospace" font-size="16" letter-spacing="1">BFCL · τ-bench · AgentHarm · AgentDojo · InjecAgent · GAIA · SWE-bench</text>
</svg>
