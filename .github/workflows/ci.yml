name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ascore
          POSTGRES_PASSWORD: ascore
          POSTGRES_DB: ascore_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ascore"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      # exercises the Postgres + Redis code paths in CI (see test markers)
      ASCORE_TEST_PG: postgresql+psycopg://ascore:ascore@localhost:5432/ascore_test
      ASCORE_TEST_REDIS: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,postgres,redis,otel]"
      - name: Lint (errors only)
        run: ruff check --select E9,F63,F7,F82 src tests
      - name: Backend tests
        run: pytest -q
      - name: Dependency vulnerability scan
        run: pip install pip-audit && pip-audit || true   # advisory; doesn't fail the build yet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Typecheck + build
        run: npm run build           # tsc --noEmit && vite build
      - name: Unit tests
        run: npx vitest run

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true            # load into the local docker so we can size it
          tags: agenttic:ci
      - name: Image size sanity (advisory)
        # The app image fills node1's disk over many rebuilds; flag if it bloats.
        # Advisory only — warns over 800 MB, never fails the build.
        run: |
          BYTES=$(docker image inspect agenttic:ci --format '{{.Size}}')
          MB=$(( BYTES / 1024 / 1024 ))
          echo "agenttic:ci image size: ${MB} MB"
          if [ "$MB" -gt 800 ]; then
            echo "::warning::agenttic:ci image is ${MB} MB (>800 MB) — check Dockerfile layers / .dockerignore."
          fi
