apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenttic.fullname" . }}
  labels:
    {{- include "agenttic.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agenttic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agenttic.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agenttic.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: agenttic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8700
          env:
            - name: AGENTTIC_HOST
              value: "0.0.0.0"
            - name: AGENTTIC_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenttic.secretName" . }}
                  key: api-token
            - name: AGENTTIC_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenttic.secretName" . }}
                  key: session-secret
            - name: AGENTTIC_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "agenttic.secretName" . }}
                  key: database-url
            {{- if .Values.airgap.enabled }}
            - name: AGENTTIC_AIRGAP
              value: "true"
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agenttic.fullname" . }}-data
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agenttic.fullname" . }}-data
  labels:
    {{- include "agenttic.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
