{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenttic.fullname" . }}
  labels:
    {{- include "agenttic.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-token: {{ .Values.secrets.apiToken | quote }}
  session-secret: {{ .Values.secrets.sessionSecret | quote }}
  database-url: {{ .Values.database.url | quote }}
{{- end }}
