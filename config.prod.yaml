# Production config sample. Copy to config.yaml (or mount it) and supply
# secrets via environment variables (see .env.example) — never commit real
# tokens/keys. Hard Rule 7: all models, thresholds, rates live here.
models:
  agent_default: claude-sonnet-4-6
  judge_executor: claude-sonnet-4-6
  judge_strong: claude-opus-4-8          # must differ from agent_default (Rule 4)
  judge_light: claude-haiku-4-5-20251001
  generator: claude-opus-4-8
harness:
  timeout_seconds: 120
  max_steps: 10
  max_parallel: 5
  transport_retries: 2
scoring:
  calibration_threshold: 0.8
  advisor_max_tokens: 2048
  fi_threshold: 0.5
live:
  sample_rate: 0.05
  drift_threshold: 0.15
  drift_window_runs: 50
paths:
  registry_db: /app/data/ascore.db       # persistent volume; ignored when ASCORE_DB (Postgres) is set
  review_dir: /app/review/
  calibration_dir: /app/calibration/
ui:
  host: 0.0.0.0
  port: 8700
  uploads_dir: /app/uploads/
leaderboard:
  suite_weights: {}
pricing:
  claude-sonnet-4-6: {input: 3.0, output: 15.0}
  claude-opus-4-8: {input: 15.0, output: 75.0}
  claude-haiku-4-5-20251001: {input: 1.0, output: 5.0}
  default: {input: 3.0, output: 15.0}
cost:
  expected_agent_steps: 3
  expected_input_tokens: 600
  expected_output_tokens: 250
  judge_input_tokens: 700
  judge_output_tokens: 120
budget:
  max_run_cost_usd: 25.0                  # hard per-run ceiling
  max_daily_cost_usd: 250.0               # global daily ceiling per tenant (0 = off)
  warn_only: false
quotas:                                   # per-tenant spend quotas (0 = unlimited)
  default: {daily_usd: 100.0, monthly_usd: 2000.0}
  tiers: {}                               # e.g. {acme: {daily_usd: 500, monthly_usd: 10000}}
observability:
  log_level: INFO
  log_json: true
  otel_enabled: false                     # set true + OTEL_EXPORTER_OTLP_ENDPOINT to export traces
anthropic:
  retry: {max_attempts: 5, base_delay: 0.5, max_delay: 30.0, jitter: true}
database:
  url: ""                                 # blank => SQLite (paths.registry_db); else read ASCORE_DB env
events:
  backend: redis                          # multi-worker SSE; redis_url from ASCORE_REDIS_URL
auth:
  required: true                          # fail closed: refuse to start without auth
  token: ""                               # set via ASCORE_API_TOKEN (do NOT hardcode)
  tokens: {}                              # {token: {role, tenant}} for additional principals
  admin_tenant: default
  session_secret: ""                      # set via ASCORE_SESSION_SECRET (else derives from the token)
  session_ttl_hours: 168                  # 7-day login session
  cookie_secure: true                     # session cookie only over HTTPS (edge TLS via the tunnel)
  allow_signup: true                      # open signup; each signup gets its own tenant workspace
  signup_role: admin                      # self-signup is admin of their own workspace
email:
  # Mail is OFF until an outbound relay is configured (node1 blocks 25/465/587;
  # use a relay on 2525 or an HTTP-API provider). Flip enabled + require_verification
  # to true once SMTP_HOST/SMTP_USER/SMTP_PASS are set in the host .env.
  enabled: false
  require_verification: false
  from: "noreply@agenttic.io"
  verify_url_base: "https://agenttic.io/verify"
  token_ttl_hours: 24
  smtp:
    host: ""                              # env SMTP_HOST (relay); use port 2525 on this droplet
    port: 2525
    user: ""                              # env SMTP_USER
    password: ""                          # env SMTP_PASS / *_FILE secret — never commit
    starttls: true
    ssl: false
security:
  rate_limit_per_minute: 120
  rate_limit_backend: redis               # shared across workers (ASCORE_REDIS_URL)
  redis_url: ""
  blackbox_block_private: true
  login_max_attempts: 5                   # failed logins per email before lockout
  login_lockout_seconds: 900
retention:                                # run `ascore retention --apply` on a schedule (cron/k8s CronJob)
  trace_redact_days: 30                    # strip inputs/outputs from traces older than N days (PII); 0 = off
  trace_prune_days: 90                     # delete traces older than N days; scorecards keep aggregates; 0 = off
